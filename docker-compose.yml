services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - NODE_ENV=development

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    volumes: # this is for hot reload, we map our local files inside conteiner
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules # and this overwrites containers modules over our mapped file
    depends_on:
      - backend
    environment:
      - VITE_PORT=3000